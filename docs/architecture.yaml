# ─── USER JOURNEY ────────────────────────────────────────────────────────────
user_journey:
  steps:
    - id: elicitation
      label: "6 forced-choice questions"
      next: [scoring]

    - id: scoring
      label: "Score profile against 7 thinker profiles"
      next: [results]
      internal: true

    - id: results
      label: "Ranked thinker cards (neighbour / destabiliser / opponent)"
      next: [thinker_select]

    - id: thinker_select
      label: "User selects thinker"
      next: [dialogue]

    - id: dialogue
      label: "Multi-turn Socratic dialogue"
      next: [thinker_select]
      notes: "Returnable; history persisted per thinker"

  # V1.1 additions (not yet active)
  planned:
    - id: follow_up
      label: "1 targeted follow-up question"
      inserts_after: elicitation
      status: v1.1

    - id: tension_card
      label: "Internal inconsistency card on results screen"
      inserts_after: results
      status: v1.1

    - id: cib_scoring
      label: "Replace mismatch scorer with weighted CIB tension scoring"
      replaces: scoring
      status: v1.1

    - id: succession_visual
      label: "Directed graph of thinker succession paths with citations"
      new_page: /succession
      status: v1.1

# ─── BUSINESS LOGIC ──────────────────────────────────────────────────────────
business_logic:
  ontology_files:
    - file: dimensions.json
      contains: "6 dimensions, each with 3-4 controlled vocabulary values"
    - file: thinkers.json
      contains: "7 thinkers: profile[], characteristicMove, premiseTargets[]"
    - file: premises.json
      contains: "8 premises: id, statement, thinker_targets[]"
    - file: moves.json
      contains: "7 move primitives: destabilisation, inversion, absorption, rejection, extension, reduction, foreclosure"

  processes:
    - name: Scoring
      input: "PositionProfile + Thinker[].profile"
      rule: ">=3 matching dimensions = neighbour; <3 = opponent; Hume always = destabiliser"
      output: "[{thinker, classification, attackVector}] ranked"

    - name: DialogueTurn
      input: "SystemPrompt(thinker, profile) + ConversationHistory"
      output: "1 question + [move label] in historical voice, ≤150 words"

    - name: PremiseExtraction
      input: "Last user message in dialogue"
      output: "premise status: held | conceded | contested"
      status: v1.1

    - name: TensionDetection
      input: "PositionProfile"
      output: "Detected contradictory premise pairs → recommended thinker"
      status: v1.1

    - name: CIBScoring
      input: "PositionProfile + cross-impact-matrix.json"
      output: "coherenceScore (float), tensionScore per thinker (float), gaps[]"
      replaces: "Scoring (mismatch count)"
      status: v1.1

    - name: MatrixPopulation
      input: "cross-impact-matrix.json schema + research agent"
      output: "Tier 1+2 matrix entries with scholarly citations and confidence scores"
      notes: "Research agent task — parallel to code implementation"
      status: v1.1

# ─── ARCHITECTURE ─────────────────────────────────────────────────────────────
architecture:
  stack:
    framework: "Next.js 15 (App Router)"
    language: TypeScript
    styling: Tailwind CSS
    runtime: Node.js (Vercel edge-compatible)

  routes:
    pages:
      - path: /
        file: app/page.tsx
        description: "Quiz elicitation flow"
      - path: /results
        file: app/results/page.tsx
        description: "Server wrapper — imports thinkers ontology, renders ResultsClient"
        client_component: app/results/results-client.tsx
      - path: /dialogue/[thinkerId]
        file: app/dialogue/[thinkerId]/page.tsx
        description: "Server wrapper — resolves thinker from ontology, renders DialogueClient"
        client_component: app/dialogue/[thinkerId]/dialogue-client.tsx
    api:
      - path: /api/dialogue
        file: app/api/dialogue/route.ts
        description: "POST — streams Anthropic response; reads ANTHROPIC_API_KEY server-side"

  engine:
    location: lib/engine/
    modules:
      - types.ts         # shared TypeScript types: PositionProfile, Thinker, RankedThinker, etc.
      - elicitation.ts   # question flow, position capture
      - scorer.ts        # profile → thinker scores → classification
      - router.ts        # returns ranked [{thinker, classification, attackVector}]
      - prompts.ts       # systemPromptFn per thinker

  ontology:
    location: ontology/
    files:
      - dimensions.json
      - thinkers.json
      - premises.json
      - moves.json
    access: "imported at build time in server components / route handlers; never fetched client-side"

  api:
    provider: Anthropic
    model: claude-sonnet-4-20250514
    calls:
      - name: dialogue_turn
        trigger: "user submits chat message"
        type: multi-turn
        system_prompt: "thinker voice + embedded profile + move instruction"
        max_tokens: ~200

      - name: premise_extraction
        trigger: "after each dialogue turn"
        type: single-shot
        system_prompt: "classify user response re: one premise"
        max_tokens: 5
        status: v1.1

  storage:
    v1: "sessionStorage — position_profile + dialogue_history_{id}"
    v1.1: "Server-side session (NextAuth or similar) + premise_state {P1..P8}"
    keys:
      - position_profile          # {base, change, nature, institution, epistemic, method}
      - dialogue_history_{id}     # per-thinker conversation array
      - premise_state             # {P1..P8: held|conceded|contested|unknown} — v1.1
